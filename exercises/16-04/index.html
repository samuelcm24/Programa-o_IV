<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça ao Yami</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="tela">
        <h1 class="titulo">Caça ao Yami</h1>

        <div class="painel">
            <div class="info">
                <p>Pontuação: <span id="pontuacao">0</span></p>
                <p>Tempo: <span id="tempo">15</span>s</p>
            </div>

            <button id="botao-iniciar">Iniciar jogo</button>
        </div>

        <div id="area-jogo" class="area-jogo"></div>

        <p id="mensagem-final" class="mensagem-final"></p>
    </div>

    <!-- efeito dourado do cursor -->
    <div id="efeito-cursor"></div>

    <script src="script.js"></script>
</body>
</html>
